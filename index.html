<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIANG - Platform Belajar Digital</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map untuk ESM -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        
        @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.5s ease-out forwards; }
        
        @keyframes toast-slide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-toast { animation: toast-slide 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased selection:bg-red-600 selection:text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calculator, BookOpen, Languages, FlaskConical, Leaf, Monitor, 
            ShieldCheck, Menu, X, GraduationCap, PlayCircle, Layers, Book, 
            HelpCircle, FileText, Star, ExternalLink, Edit, Trash2, Users, 
            CheckCircle, ArrowLeft, FolderOpen, Calendar, PlusCircle, Lock, Loader2,
            Home, LayoutGrid, ChevronLeft, ChevronRight, Trophy, Medal, Crown, Award,
            Gamepad2, User, Palette, Activity, Map, Flag, Compass, MessageCircle, Quote,
            Maximize, Minimize, AlertTriangle, MapPin, Phone, Mail, Instagram, Youtube, 
            Globe, Heart, Sparkles, Send
        } from 'lucide-react';

        // --- KONFIGURASI API ---
        const API_URL = "https://script.google.com/macros/s/AKfycbynmTX_8RPqDDUKMpwU-0bquCTbh42MfZRFp9OAQolyZTvKuVNA7j3g0qI3klzemH0i/exec"; 

        function App() {
            // Navigation State
            const [view, setView] = useState('home'); 
            const [activeSubject, setActiveSubject] = useState(null);
            const [activeNav, setActiveNav] = useState('hero'); 

            // Pagination State (Materi)
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(10);

            // Slider Testimoni State
            const [testiIndex, setTestiIndex] = useState(0);

            // App State
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [isPseudoFullscreen, setIsPseudoFullscreen] = useState(false);

            // Data State
            const [mediaData, setMediaData] = useState([]);
            const [contributors, setContributors] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);

            // Testimoni State
            const [testimonies, setTestimonies] = useState([
                { id: 1, name: 'Budi Santoso', role: 'Siswa Kelas 5', text: 'Belajar di RIANG sangat menyenangkan! Materinya mudah dipahami, menarik, dan banyak kuis seru.', rating: 5, initials: 'BS' },
                { id: 2, name: 'Ibu Siti Aminah', role: 'Guru Wali Kelas', text: 'Sangat terbantu dengan media pembelajaran yang ada di sini. Anak-anak jadi lebih aktif di kelas.', rating: 5, initials: 'SA' },
                { id: 3, name: 'Andi Pratama', role: 'Siswa Kelas 6', text: 'Game edukasinya keren banget! Sambil main bisa sambil belajar matematika dan tidak membosankan.', rating: 4, initials: 'AP' },
                { id: 4, name: 'Bpk. Hendra', role: 'Orang Tua Siswa', text: 'Platform yang luar biasa untuk mendukung anak belajar di rumah. Terus pertahankan inovasinya!', rating: 5, initials: 'HD' },
                { id: 5, name: 'Nisa Rahma', role: 'Siswa Kelas 4', text: 'Video pembelajarannya bagus-bagus. Aku yang dulunya kurang suka IPA sekarang jadi semangat belajar.', rating: 5, initials: 'NR' },
                { id: 6, name: 'Pak Dedi', role: 'Guru Olahraga', text: 'Materi PJOK sangat lengkap dan mudah diakses menggunakan HP saat di lapangan. Mantap!', rating: 5, initials: 'PD' }
            ]);
            const [isTestimoniModalOpen, setIsTestimoniModalOpen] = useState(false);

            // Admin Modal State
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [adminTab, setAdminTab] = useState('media'); 
            const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            
            // Form/Editing State
            const [editingMedia, setEditingMedia] = useState(null);
            const [editingContributor, setEditingContributor] = useState(null);
            const [editingTestimonial, setEditingTestimonial] = useState(null); // <-- STATE BARU UNTUK EDIT TESTIMONI
            
            // Delete Confirmation State
            const [deleteModal, setDeleteModal] = useState({ show: false, type: null, id: null, itemName: '' });

            // Toast State
            const [toast, setToast] = useState({ show: false, title: '', message: '' });

            // Daftar Subjek Pelajaran
            const subjectList = [
                'Matematika', 'B. Indonesia', 'B. Inggris', 'IPAS', 'TIK', 
                'Pancasila', 'Pend. Agama', 'Seni Budaya', 'PJOK', 'B. Lampung', 
                'Game PID', 'Lainnya'
            ];

            // Data Visual untuk Render Kartu Mata Pelajaran
            const subjectsVisualData = [
                { subject: 'Matematika', icon: Calculator, desc: 'Hitungan & Logika', theme: { bg: 'bg-blue-50', text: 'text-blue-600', hoverBg: 'group-hover:bg-blue-600', border: 'hover:border-blue-200' } },
                { subject: 'B. Indonesia', icon: BookOpen, desc: 'Literasi Kata', theme: { bg: 'bg-red-50', text: 'text-red-600', hoverBg: 'group-hover:bg-red-600', border: 'hover:border-red-200' } },
                { subject: 'B. Inggris', icon: Languages, desc: 'English Basic', theme: { bg: 'bg-purple-50', text: 'text-purple-600', hoverBg: 'group-hover:bg-purple-600', border: 'hover:border-purple-200' } },
                { subject: 'IPAS', icon: Leaf, desc: 'Alam & Sosial', theme: { bg: 'bg-emerald-50', text: 'text-emerald-600', hoverBg: 'group-hover:bg-emerald-600', border: 'hover:border-emerald-200' } },
                
                { subject: 'Pancasila', icon: Flag, desc: 'Pendidikan Karakter', theme: { bg: 'bg-orange-50', text: 'text-orange-600', hoverBg: 'group-hover:bg-orange-600', border: 'hover:border-orange-200' } },
                { subject: 'Pend. Agama', icon: Star, desc: 'Moral & Spiritual', theme: { bg: 'bg-teal-50', text: 'text-teal-600', hoverBg: 'group-hover:bg-teal-600', border: 'hover:border-teal-200' } },
                { subject: 'Seni Budaya', icon: Palette, desc: 'Kreativitas & Karya', theme: { bg: 'bg-pink-50', text: 'text-pink-600', hoverBg: 'group-hover:bg-pink-600', border: 'hover:border-pink-200' } },
                { subject: 'PJOK', icon: Activity, desc: 'Jasmani & Olahraga', theme: { bg: 'bg-amber-50', text: 'text-amber-600', hoverBg: 'group-hover:bg-amber-600', border: 'hover:border-amber-200' } },

                { subject: 'TIK', icon: Monitor, desc: 'Komputer Dasar', theme: { bg: 'bg-cyan-50', text: 'text-cyan-600', hoverBg: 'group-hover:bg-cyan-600', border: 'hover:border-cyan-200' } },
                { subject: 'B. Lampung', icon: Map, desc: 'Muatan Lokal', theme: { bg: 'bg-indigo-50', text: 'text-indigo-600', hoverBg: 'group-hover:bg-indigo-600', border: 'hover:border-indigo-200' } },
                { subject: 'Game PID', icon: Gamepad2, desc: 'Bermain & Belajar', theme: { bg: 'bg-violet-50', text: 'text-violet-600', hoverBg: 'group-hover:bg-violet-600', border: 'hover:border-violet-200' } },
                { subject: 'Lainnya', icon: Compass, desc: 'Ekskul & Lainnya', theme: { bg: 'bg-gray-100', text: 'text-gray-600', hoverBg: 'group-hover:bg-gray-700', border: 'hover:border-gray-300' } }
            ];

            // --- FETCH DATA (READ) ---
            useEffect(() => {
                fetchData();
            }, []);

            // Setup Intersection Observer for active nav state
            useEffect(() => {
                if (view !== 'home') return;

                const handleScroll = () => {
                    const sections = ['hero', 'services', 'testimoni', 'contributors'];
                    let currentActive = 'hero';
                    
                    for (const section of sections) {
                        const element = document.getElementById(section);
                        if (element) {
                            const rect = element.getBoundingClientRect();
                            if (rect.top <= 150 && rect.bottom >= 150) {
                                currentActive = section;
                                break;
                            }
                        }
                    }
                    setActiveNav(currentActive);
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [view]);

            // Listener untuk mendeteksi perubahan status fullscreen
            useEffect(() => {
                const onFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                
                document.addEventListener('fullscreenchange', onFullscreenChange);
                document.addEventListener('webkitfullscreenchange', onFullscreenChange);
                document.addEventListener('mozfullscreenchange', onFullscreenChange);
                document.addEventListener('MSFullscreenChange', onFullscreenChange);
                
                return () => {
                    document.removeEventListener('fullscreenchange', onFullscreenChange);
                    document.removeEventListener('webkitfullscreenchange', onFullscreenChange);
                    document.removeEventListener('mozfullscreenchange', onFullscreenChange);
                    document.removeEventListener('MSFullscreenChange', onFullscreenChange);
                };
            }, []);

            const fetchData = async () => {
                if (API_URL.includes("GANTI_DENGAN_URL")) {
                    setIsLoading(false);
                    return; 
                }

                setIsLoading(true);
                try {
                    const response = await fetch(`${API_URL}?action=getAll`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setMediaData(result.media || []);
                        const rawContributors = (result.contributors || []).map(c => ({
                            ...c,
                            points: c.points ? parseInt(c.points) : Math.floor(Math.random() * 500) + 100 
                        }));
                        setContributors(rawContributors.sort((a, b) => b.points - a.points));
                    }
                } catch (error) {
                    showToast("Error", "Gagal mengambil data, memuat mode lokal.");
                    console.error("Fetch Data Error:", error);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- API HELPERS ---
            const sendData = async (payload) => {
                setIsSaving(true);
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.status === 'success') return true;
                    else throw new Error(result.message);
                } catch (error) {
                    showToast("Gagal", "Terjadi kesalahan server.");
                    return false;
                } finally {
                    setIsSaving(false);
                }
            };

            // --- HANDLERS UI ---
            const isCurrentlyFullscreen = isFullscreen || isPseudoFullscreen;

            const toggleFullScreen = () => {
                if (!isCurrentlyFullscreen) {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {
                            setIsPseudoFullscreen(true);
                        });
                    } else {
                        setIsPseudoFullscreen(true);
                    }
                } else {
                    if (document.fullscreenElement && document.exitFullscreen) {
                        document.exitFullscreen().catch(() => {});
                    }
                    setIsPseudoFullscreen(false);
                }
            };

            const handleNavigate = (sectionId) => {
                setActiveNav(sectionId);
                if (view !== 'home') {
                    setView('home');
                    setTimeout(() => {
                        const element = document.getElementById(sectionId);
                        if (element) element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                } else {
                    const element = document.getElementById(sectionId);
                    if (element) element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            const handleOpenSubject = (subject) => {
                setActiveSubject(subject);
                setCurrentPage(1); 
                setView('subject');
                window.scrollTo(0, 0);
            };

            const handleItemsPerPageChange = (e) => {
                setItemsPerPage(Number(e.target.value));
                setCurrentPage(1); 
            };

            const paginate = (pageNumber) => {
                setCurrentPage(pageNumber);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const checkAdminAccess = () => {
                setIsPasswordModalOpen(true);
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === 'k0mbel') {
                    setIsPasswordModalOpen(false); 
                    setPasswordInput(''); 
                    setIsAdminOpen(true); 
                    showToast("Akses Diterima", "Selamat datang di Panel Admin.");
                } else {
                    showToast("Akses Ditolak", "Password yang Anda masukkan salah!");
                    setPasswordInput(''); 
                }
            };

            const showToast = (title, message) => {
                setToast({ show: true, title, message });
                setTimeout(() => setToast({ show: false, title: '', message: '' }), 4000);
            };

            const handleSaveTestimoni = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('name');
                const newTestimoni = {
                    id: Date.now(),
                    name: name,
                    role: formData.get('role'),
                    text: formData.get('text'),
                    rating: parseInt(formData.get('rating')),
                    initials: name.substring(0, 2).toUpperCase()
                };
                
                setTestimonies([newTestimoni, ...testimonies]);
                setTestiIndex(0); // Kembali ke slide pertama untuk melihat yang baru
                showToast("Terima Kasih!", "Testimoni Anda berhasil dikirim.");
                setIsTestimoniModalOpen(false);
            };

            // LOGIKA SLIDER TESTIMONI
            const itemsPerSlide = 3;
            const maxTestiIndex = Math.max(0, testimonies.length - itemsPerSlide);
            
            const nextTestimoni = () => {
                setTestiIndex(prev => Math.min(prev + 1, maxTestiIndex));
            };
            
            const prevTestimoni = () => {
                setTestiIndex(prev => Math.max(prev - 1, 0));
            };

            // --- CRUD HANDLERS (Media & Kontributor) ---
            const handleSaveMedia = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const contributorId = formData.get('contributorId');
                
                const newItem = {
                    id: editingMedia ? editingMedia.id : Date.now(),
                    title: formData.get('title'),
                    subject: formData.get('subject'),
                    classGrade: formData.get('classGrade'),
                    type: formData.get('type'),
                    rating: formData.get('rating'),
                    link: formData.get('link'),
                    desc: formData.get('desc'),
                    contributorId: contributorId,
                    date: editingMedia ? editingMedia.date : new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'})
                };
                
                const action = editingMedia ? 'update' : 'create';
                
                if (await sendData({ action, sheet: 'Media', items: newItem })) {
                    action === 'create' 
                        ? setMediaData([...mediaData, newItem]) 
                        : setMediaData(mediaData.map(i => i.id === newItem.id ? newItem : i));
                    
                    if (action === 'create' && contributorId) {
                        const contributor = contributors.find(c => c.id.toString() === contributorId);
                        if (contributor) {
                            const newPoints = (parseInt(contributor.points) || 0) + 10;
                            const updatedContributor = { ...contributor, points: newPoints };
                            let updatedList = contributors.map(c => c.id === updatedContributor.id ? updatedContributor : c);
                            updatedList.sort((a, b) => (b.points || 0) - (a.points || 0));
                            setContributors(updatedList);
                            sendData({ action: 'update', sheet: 'Contributors', items: updatedContributor });
                            showToast("Berhasil", `Media ditambahkan! +10 Poin untuk ${contributor.name} 🏆`);
                        }
                    } else {
                        showToast("Berhasil", "Data media berhasil diperbarui.");
                    }

                    setEditingMedia(null); 
                    e.target.reset();
                }
            };

            const handleSaveContributor = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newItem = { 
                    id: editingContributor ? editingContributor.id : Date.now(), 
                    name: formData.get('name'), 
                    role: formData.get('role'), 
                    initials: formData.get('initials').toUpperCase(), 
                    desc: formData.get('desc'),
                    points: parseInt(formData.get('points')) || 0,
                    level: formData.get('level') || 'Level 1 - Newbie' 
                };
                
                const action = editingContributor ? 'update' : 'create';
                if (await sendData({ action, sheet: 'Contributors', items: newItem })) {
                    let updatedList = action === 'create' ? [...contributors, newItem] : contributors.map(i => i.id === newItem.id ? newItem : i);
                    updatedList.sort((a, b) => (b.points || 0) - (a.points || 0));
                    setContributors(updatedList);
                    showToast("Berhasil", "Data kontributor disimpan.");
                    setEditingContributor(null); 
                    e.target.reset();
                }
            };

            // --- FUNGSI UPDATE TESTIMONI (ADMIN) ---
            const handleUpdateTestimonial = (e) => {
                e.preventDefault();
                setTestimonies(prev => prev.map(t => 
                    t.id === editingTestimonial.id ? editingTestimonial : t
                ));
                setEditingTestimonial(null);
                showToast("Berhasil", "Testimoni diperbarui.");
            };

            // --- FUNGSI DELETE (DIPERBARUI) ---
            const executeDelete = async () => {
                try {
                    if (deleteModal.type === 'media') {
                        if (await sendData({ action: 'delete', sheet: 'Media', items: { id: deleteModal.id } })) {
                            setMediaData(mediaData.filter(i => i.id !== deleteModal.id));
                            showToast("Terhapus", "Data media berhasil dihapus.");
                        }
                    } else if (deleteModal.type === 'contributor') {
                        if (await sendData({ action: 'delete', sheet: 'Contributors', items: { id: deleteModal.id } })) {
                            setContributors(contributors.filter(i => i.id !== deleteModal.id));
                            showToast("Terhapus", "Kontributor berhasil dihapus.");
                        }
                    } else if (deleteModal.type === 'testimonial') {
                        // Hapus Testimoni (Lokal State)
                        setTestimonies(prev => prev.filter(t => t.id !== deleteModal.id));
                        showToast("Terhapus", "Testimoni berhasil dihapus.");
                    }
                } finally {
                    setDeleteModal({ show: false, type: null, id: null, itemName: '' });
                }
            };


            // --- UI COMPONENTS ---
            const SubjectCard = ({ subject, icon: Icon, desc, theme, index }) => (
                <div 
                    onClick={() => handleOpenSubject(subject)} 
                    className={`animate-slide-up cursor-pointer group p-5 sm:p-6 bg-white rounded-3xl border border-gray-100 shadow-sm active:scale-95 ${theme.border} hover:shadow-xl transition-all duration-300 flex flex-col items-start relative overflow-hidden`}
                    style={{ animationDelay: `${index * 50}ms` }}
                >
                    <div className={`absolute -right-8 -top-8 w-28 h-28 rounded-full ${theme.bg} opacity-0 group-hover:opacity-60 transition-opacity duration-500 ease-out blur-2xl`}></div>

                    <div className={`w-14 h-14 ${theme.bg} rounded-2xl flex items-center justify-center ${theme.text} mb-4 ${theme.hoverBg} group-hover:text-white transition-colors duration-300 relative z-10 shadow-sm`}>
                        <Icon size={26} strokeWidth={2.5} />
                    </div>
                    
                    <h3 className="text-base sm:text-lg font-bold text-gray-900 mb-1 leading-tight relative z-10 group-hover:text-gray-800">{subject}</h3>
                    <p className="text-gray-500 text-[11px] sm:text-xs line-clamp-2 leading-relaxed relative z-10">{desc}</p>
                    
                    <div className={`absolute bottom-5 right-5 opacity-0 group-hover:opacity-100 transform translate-x-2 group-hover:translate-x-0 transition-all duration-300 ${theme.text}`}>
                        <ChevronRight size={18} strokeWidth={3} />
                    </div>
                </div>
            );

            const TestimoniCard = ({ item }) => (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative hover:shadow-md transition-shadow h-full flex flex-col">
                    <Quote className="absolute top-4 right-4 text-gray-100" size={40} />
                    <div className="flex gap-1 mb-3 text-yellow-400">
                        {[...Array(parseInt(item.rating) || 5)].map((_, i) => <Star key={i} size={16} fill="currentColor" />)}
                    </div>
                    <p className="text-gray-600 text-sm mb-6 relative z-10 italic flex-1">"{item.text}"</p>
                    <div className="flex items-center gap-3 border-t border-gray-50 pt-4 mt-auto">
                        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-red-50 to-red-100 text-red-600 flex items-center justify-center font-bold text-sm shadow-inner border border-red-50 shrink-0">
                            {item.initials}
                        </div>
                        <div className="overflow-hidden">
                            <h4 className="font-bold text-gray-900 text-sm truncate">{item.name}</h4>
                            <p className="text-[11px] text-gray-500 font-medium truncate">{item.role}</p>
                        </div>
                    </div>
                </div>
            );

            const NavBtn = ({ id, icon: Icon, label, onClick, isActive }) => (
                <button 
                    onClick={onClick}
                    className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all duration-200 active:scale-90 ${isActive ? 'text-red-600' : 'text-gray-400 hover:text-gray-600'}`}
                >
                    <div className={`p-1.5 rounded-xl ${isActive ? 'bg-red-50' : 'bg-transparent'}`}>
                        <Icon size={22} strokeWidth={isActive ? 2.5 : 2} />
                    </div>
                    <span className="text-[9px] font-semibold tracking-wide">{label}</span>
                </button>
            );

            const DesktopNavBtn = ({ id, icon: Icon, label, onClick, isActive }) => (
                <button 
                    onClick={onClick}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 group ${isActive ? 'bg-red-50 text-red-600 shadow-sm' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-900'}`}
                >
                    <Icon size={20} strokeWidth={2} />
                    <span className="font-semibold text-sm">{label}</span>
                    {isActive && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-red-600"></div>}
                </button>
            );

            const Toast = () => {
                if (!toast.show) return null;
                return (
                    <div className="fixed top-4 right-4 z-[100] animate-toast">
                        <div className="bg-white border-l-4 border-red-600 shadow-lg rounded-lg p-4 flex items-start gap-3 w-72">
                            <CheckCircle className="text-red-600 shrink-0 mt-0.5" size={20} />
                            <div>
                                <h4 className="text-sm font-bold text-gray-900">{toast.title}</h4>
                                <p className="text-xs text-gray-600 mt-1">{toast.message}</p>
                            </div>
                        </div>
                    </div>
                );
            };

            if (isLoading && !API_URL.includes("GANTI")) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-red-600">
                        <Loader2 size={48} className="animate-spin mb-4" />
                        <p className="font-bold animate-pulse text-sm">Memuat Data RIANG...</p>
                    </div>
                );
            }

            // PAGINATION LOGIC MATERI
            let filteredMedia = [];
            let currentItems = [];
            let totalPages = 0;

            if (view === 'subject' && activeSubject) {

                                                            <div key={p.id} className="bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                                                                <div className="flex items-center gap-3 overflow-hidden pr-2">
                                                                    <div className="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold shrink-0">{p.initials}</div>
                                                                    <div className="truncate">
                                                                        <p className="font-bold text-sm truncate text-gray-900">{p.name}</p>
                                                                        <p className="text-[10px] font-semibold text-gray-500">{p.level || 'Level 1 - Newbie'}</p>
                                                                        <p className="text-xs font-bold text-yellow-600 truncate">{p.points || 0} Poin Leaderboard</p>
                                                                    </div>
                                                                </div>
                                                                <div className="flex gap-2 shrink-0">
                                                                    <button onClick={() => setEditingContributor(p)} className="p-2 bg-yellow-50 text-yellow-600 rounded-lg"><Edit size={16} /></button>
                                                                    <button onClick={() => setDeleteModal({ show: true, type: 'contributor', id: p.id, itemName: p.name })} className="p-2 bg-red-50 text-red-600 rounded-lg"><Trash2 size={16} /></button>
                                                                </div>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        {adminTab === 'testimoni' && (
                                            <div className="space-y-4">
                                                <h4 className="font-bold text-sm text-gray-900 mb-3">Kelola Ulasan Pengguna</h4>
                                                {testimonies.length === 0 ? (
                                                    <div className="text-center text-gray-400 py-4 text-xs">Belum ada testimoni.</div>
                                                ) : (
                                                    testimonies.map(t => (
                                                        <div key={t.id} className="bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-start shadow-sm gap-3">
                                                            <div>
                                                                <h5 className="font-bold text-sm text-gray-900">{t.name} <span className="text-xs font-normal text-gray-500">({t.role})</span></h5>
                                                                <p className="text-xs text-gray-600 mt-1 italic">"{t.text}"</p>
                                                                <div className="flex text-yellow-400 gap-0.5 mt-1">
                                                                    {[...Array(t.rating || 5)].map((_, i) => <Star key={i} size={10} fill="currentColor" />)}
                                                                </div>
                                                            </div>
                                                            <div className="flex gap-2 shrink-0">
                                                                <button onClick={() => setEditingTestimonial(t)} className="p-2 bg-yellow-50 text-yellow-600 rounded-lg hover:bg-yellow-100"><Edit size={16} /></button>
                                                                <button onClick={() => setDeleteModal({ show: true, type: 'testimonial', id: t.id, itemName: t.name })} className="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100"><Trash2 size={16} /></button>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL EDIT TESTIMONI --- */}
                    {editingTestimonial && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl relative animate-slide-up">
                                <h3 className="text-lg font-bold text-gray-900 mb-4">Edit Testimoni</h3>
                                <form onSubmit={handleUpdateTestimonial} className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Nama Pembuat</label>
                                        <input 
                                            type="text" 
                                            value={editingTestimonial.name} 
                                            onChange={e => setEditingTestimonial({...editingTestimonial, name: e.target.value})} 
                                            className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
                                            required 
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Peran (Misal: Siswa)</label>
                                        <input 
                                            type="text" 
                                            value={editingTestimonial.role} 
                                            onChange={e => setEditingTestimonial({...editingTestimonial, role: e.target.value})} 
                                            className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
                                            required 
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Isi Testimoni</label>
                                        <textarea 
                                            value={editingTestimonial.text} 
                                            onChange={e => setEditingTestimonial({...editingTestimonial, text: e.target.value})} 
                                            className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
                                            rows="4" 
                                            required
                                        ></textarea>
                                    </div>
                                    <div className="flex justify-end gap-3 pt-2">
                                        <button 
                                            type="button" 
                                            onClick={() => setEditingTestimonial(null)} 
                                            className="px-4 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-50"
                                        >
                                            Batal
                                        </button>
                                        <button 
                                            type="submit" 
                                            className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-md active:scale-95 transition-transform"
                                        >
                                            Simpan
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
